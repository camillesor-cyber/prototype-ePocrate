<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ePocrate</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--n:#0B1D3A;--n2:#132B52;--t:#2A9D8F;--tl:#40B5A6;--tp:#E8F5F3;--td:#1E7A6E;--go:#E9C46A;--gop:#FFF8E7;--co:#E76F51;--cop:#FEF0EC;--g50:#F7F8FA;--g100:#ECEEF2;--g200:#D5D9E2;--g300:#B4BBCA;--g400:#8D96A8;--g500:#6B7589;--g600:#4A5468;--g800:#2D3344;--w:#FFF;--r:14px;--rs:10px;--ss:0 1px 3px rgba(11,29,58,.06);--s:0 2px 12px rgba(11,29,58,.08);--sl:0 8px 30px rgba(11,29,58,.12)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit',sans-serif;background:var(--g50);color:var(--g800);overflow-x:hidden}button{font-family:inherit;cursor:pointer;border:none}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:var(--g200);width:100%;outline:none}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--t);border:3px solid #fff;box-shadow:var(--s)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.welcome{position:fixed;inset:0;background:var(--w);z-index:300;display:flex;align-items:center;justify-content:center;transition:opacity .5s,transform .5s}.welcome.gone{opacity:0;transform:scale(1.05);pointer-events:none}
.w-inner{text-align:center;animation:si .6s ease;max-width:400px;padding:40px}.w-logo{width:90px;margin-bottom:20px}
.w-inner h1{font-size:26px;font-weight:700;color:var(--n);margin-bottom:8px;letter-spacing:-.5px}
.w-inner p{font-size:15px;color:var(--g500);line-height:1.6;margin-bottom:28px;font-weight:300}
.w-btn{background:var(--t);color:#fff;padding:14px 36px;border-radius:12px;font-size:15px;font-weight:600;transition:all .25s;box-shadow:0 4px 16px rgba(42,157,143,.3)}.w-btn:hover{background:var(--td);transform:translateY(-2px)}
.sb{position:fixed;left:0;top:0;bottom:0;width:250px;background:var(--n);display:flex;flex-direction:column;z-index:100}
.sb-l{padding:20px 18px 2px;display:flex;align-items:center;gap:9px}.sb-l img{width:36px}.sb-l span{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.3px}
.sb-s{font-size:11px;color:var(--g400);padding:2px 18px 18px;font-weight:300}
.sb-n{flex:1;padding:4px 10px;display:flex;flex-direction:column;gap:2px}
.nb{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:var(--rs);background:transparent;color:rgba(255,255,255,.5);font-size:13px;font-weight:400;width:100%;text-align:left;transition:all .2s}.nb.on{background:rgba(42,157,143,.15);color:var(--tl);font-weight:600}.nb:hover:not(.on){background:rgba(255,255,255,.04);color:rgba(255,255,255,.7)}
.ni{width:18px;text-align:center;font-size:14px}
.sb-p{padding:13px 15px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:9px}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--t),var(--go));display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;color:#fff;flex-shrink:0}
.mn{margin-left:250px;padding:0 32px 44px;min-height:100vh}
.tb{padding:20px 0 14px;display:flex;justify-content:space-between;align-items:center}
.tbt{font-size:22px;font-weight:700;color:var(--n);letter-spacing:-.5px}.tbs{font-size:13px;color:var(--g400);margin-top:2px;font-weight:300}
.tba{display:flex;gap:8px}.tbtn{padding:7px 12px;border-radius:var(--rs);background:var(--w);color:var(--g500);font-size:12.5px;font-weight:500;box-shadow:var(--ss);border:1px solid var(--g100);position:relative;transition:all .2s}.tbtn:hover{box-shadow:var(--s)}
.nd{width:7px;height:7px;border-radius:50%;background:var(--co);position:absolute;top:5px;right:5px}
.cd{background:var(--w);border-radius:var(--r);padding:20px;box-shadow:var(--ss);border:1px solid var(--g100);transition:all .25s}.cd:hover{box-shadow:var(--s)}
.cdd{background:linear-gradient(135deg,var(--n),var(--n2));color:#fff;border:none}
.sts{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.st{background:var(--w);border-radius:var(--r);padding:16px 18px;box-shadow:var(--ss);border:1px solid var(--g100);position:relative;overflow:hidden;transition:all .25s}.st:hover{transform:translateY(-2px);box-shadow:var(--s)}
.stb{position:absolute;top:0;left:0;right:0;height:3px}.stl{font-size:11px;color:var(--g400);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}.stv{font-size:24px;font-weight:700;color:var(--n);letter-spacing:-1px}
.std{font-size:11px;font-weight:600;margin-top:4px;display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:5px}.du{color:var(--t);background:var(--tp)}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:18px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.sec{font-size:15px;font-weight:700;color:var(--n);margin-bottom:12px}
.pr{height:6px;border-radius:3px;background:var(--g100);position:relative;overflow:hidden}.prf{position:absolute;top:0;left:0;height:100%;border-radius:3px;transition:width .8s ease}
.ft{background:var(--t)}.fg{background:var(--go)}.fgr{background:linear-gradient(90deg,var(--t),var(--tl))}.prd{background:rgba(255,255,255,.12)}
.bg{display:inline-flex;padding:3px 8px;border-radius:5px;font-size:10.5px;font-weight:600}
.bt{background:var(--tp);color:var(--t)}.bgo{background:var(--gop);color:#B8860B}.bco{background:var(--cop);color:var(--co)}.bgr{background:var(--g100);color:var(--g500)}
.btn{padding:10px 20px;border-radius:var(--rs);font-size:13px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.bsm{padding:6px 12px;font-size:12px}.bp{background:var(--t);color:#fff}.bp:hover{background:var(--td);transform:translateY(-1px)}.bs{background:var(--g100);color:var(--g600)}.bg2{background:transparent;color:var(--t)}
.bf{width:100%;justify-content:center}
.md{border-radius:var(--r);padding:16px;border:1px solid var(--g100);box-shadow:var(--ss);background:var(--w);margin-bottom:9px;cursor:pointer;transition:all .2s}
.md:hover:not(.lk){box-shadow:var(--s);transform:translateY(-1px)}.md.lk{background:var(--g50);border-color:var(--g200);opacity:.6;cursor:default}
.mh{display:flex;align-items:center;gap:12px}.mi{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.mdt{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--g100);animation:fi .3s ease}.mdt.op{display:block}
.mls{display:grid;grid-template-columns:1fr 1fr;gap:7px}.ml{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:var(--rs);background:var(--g50);font-size:12px;color:var(--g500);cursor:pointer}.ml.dn{color:var(--t)}.ml:hover{background:var(--g100)}
.lesson-view{background:var(--w);border-radius:var(--r);padding:28px;box-shadow:var(--s);border:1px solid var(--g100);margin-bottom:18px}
.lesson-view h3{font-size:18px;font-weight:700;color:var(--n);margin-bottom:6px}.lesson-view .lsub{font-size:13px;color:var(--g400);margin-bottom:20px}
.lesson-view .lc{font-size:14px;color:var(--g600);line-height:1.8}.lesson-view .lc p{margin-bottom:14px}.lesson-view .lc strong{color:var(--n)}
.lesson-view .callout{background:var(--tp);border-radius:var(--rs);padding:14px 16px;margin:16px 0;font-size:13px;color:var(--t);line-height:1.6}
.lesson-view .lnav{display:flex;justify-content:space-between;margin-top:24px;padding-top:16px;border-top:1px solid var(--g100)}
.ck{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--g100);cursor:pointer;font-size:13px}.ck.d{color:var(--g400);text-decoration:line-through}
.cc{width:20px;height:20px;border-radius:50%;border:2px solid var(--g200);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10.5px;flex-shrink:0;transition:all .2s}.cc.d{border-color:var(--t);background:var(--t)}
.ph{display:flex;gap:11px;margin-bottom:9px}.pm{display:flex;gap:12px;font-size:12px;color:var(--g400);margin-top:7px}.pm button{background:none;border:none;color:var(--t);font-size:12px;font-weight:500;cursor:pointer;padding:0}
.sl{font-size:12px;font-weight:600;color:var(--g500);margin-bottom:4px;display:block}
.sr{background:linear-gradient(135deg,var(--n),var(--n2));border-radius:var(--r);padding:20px;color:#fff;margin-top:16px}
.srow{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}.sdo{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.stip{margin-top:16px;padding:12px;border-radius:var(--rs);background:var(--tp);font-size:12px;color:var(--t);line-height:1.5}
.tg{display:flex;gap:7px;margin-bottom:16px}.tgb{flex:1;padding:10px;border-radius:var(--rs);border:2px solid var(--g200);background:var(--w);color:var(--g500);font-size:12.5px;font-weight:600;transition:all .2s}.tgb.on{border-color:var(--t);background:var(--tp);color:var(--t)}
.pie-wrap{display:flex;align-items:center;gap:20px;margin-top:16px}.pie{width:120px;height:120px;border-radius:50%;flex-shrink:0}
.pie-legend{display:flex;flex-direction:column;gap:6px}.pie-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g600)}.pie-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.ci{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--g100)}.ci:last-child{border-bottom:none}
.act{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;border-radius:var(--rs);margin-bottom:6px}.act.u{background:var(--cop)}.act:not(.u){background:var(--g50)}
.pls{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}.pl{padding:6px 14px;border-radius:8px;border:1px solid var(--g200);background:var(--w);color:var(--g500);font-size:12px;font-weight:600;transition:all .15s}.pl.on{border-color:var(--t);background:var(--tp);color:var(--t)}
.new-post{background:var(--g50);border-radius:var(--r);padding:16px;margin-bottom:18px;border:1px solid var(--g100)}
.new-post textarea{width:100%;border:1px solid var(--g200);border-radius:var(--rs);padding:10px 12px;font-family:inherit;font-size:13px;resize:none;height:70px;outline:none;transition:border .2s}.new-post textarea:focus{border-color:var(--t)}
.new-post .npa{display:flex;justify-content:flex-end;margin-top:8px}
.tl-bar{display:flex;align-items:center;gap:4px;margin-bottom:16px;padding:0 4px}.tl-seg{height:4px;border-radius:2px;flex:1;transition:background .3s}
.pg{animation:fi .35s ease}
</style>
</head>

"Les bases de la trésorerie":{title:"Les bases de la trésorerie",duration:"12 min",content:'<p>La trésorerie d\'un cabinet médical, c\'est simplement <strong>l\'argent disponible à un instant T</strong>. C\'est la différence entre ce qui est rentré (honoraires, remboursements CPAM) et ce qui est sorti (charges, cotisations, loyer, matériel).</p><p>Contrairement à ce que beaucoup de médecins pensent, <strong>un cabinet rentable peut avoir une trésorerie négative</strong>. C\'est le piège classique des premières années d\'installation.</p><div class="callout">💡 Exemple : vous facturez 8 000 euros en janvier. La CPAM rembourse en mars. L\'URSSAF prélève en février. Résultat : vous êtes rentable mais votre compte est vide en février.</div><p>C\'est le <strong>décalage de trésorerie</strong>. La leçon suivante vous expliquera comment l\'anticiper.</p><p><strong>Les 3 règles d\'or :</strong></p><p>1. Toujours avoir 2 à 3 mois de charges d\'avance sur votre compte pro</p><p>2. Ne jamais confondre chiffre d\'affaires et trésorerie disponible</p><p>3. Provisionner chaque mois pour les échéances trimestrielles (URSSAF, CARMF)</p>'},
"Anticiper les décalages":{title:"Anticiper les décalages de trésorerie",duration:"15 min",content:'<p>Les décalages de trésorerie sont <strong>la première cause de stress financier</strong> chez les médecins libéraux en début d\'installation.</p><p><strong>Les 3 sources principales :</strong></p><p>1. <strong>Le délai CPAM</strong> : entre la consultation et le remboursement, 2 à 8 semaines selon les mutuelles.</p><p>2. <strong>L\'appel URSSAF de la première année</strong> : cotisations calculées sur une base forfaitaire, souvent déconnectée de vos vrais revenus.</p><div class="callout">⚠️ Le remboursement URSSAF est imposable. Si on vous rembourse 3 000 euros, vous paierez de l\'impôt dessus l\'année suivante. C\'est le piège que Julien, rhumatologue depuis 20 ans, a décrit dans nos entretiens.</div><p>3. <strong>Les investissements initiaux</strong> : matériel, logiciel, aménagement. Tout sort d\'un coup.</p><p><strong>La solution : le tableau de trésorerie prévisionnel.</strong> Un document simple qui liste mois par mois vos entrées et sorties. On le construit dans la leçon suivante.</p>'}
